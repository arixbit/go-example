x-app: &app
  image: go-skeleton:local
  build:
    context: .
  environment:
    POSTGRES: postgres://app:app@postgres:5432/app?sslmode=disable&connect_timeout=5
    REDIS_ADDR: redis:6379
    REDIS_CACHE_DB: 0
    REDIS_QUEUE_DB: 6
    JWT_SECRET: local-development-only
    SERVER_PORT: :3000

services:
  postgres:
    image: postgres:17.10-alpine3.23
    environment:
      POSTGRES_DB: app
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d app"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  redis:
    image: redis:7.4.9-alpine3.21
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  migrate:
    <<: *app
    command: ["/usr/local/bin/migrate"]
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  api:
    <<: *app
    command: ["/usr/local/bin/api"]
    ports:
      - "${API_PORT:-3000}:3000"
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:3000/health"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    restart: unless-stopped

  worker:
    <<: *app
    command: ["/usr/local/bin/worker"]
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
